apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: imageTextExtractor-rag-ai
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'imageTextExtractor-rag-api-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['imageTextExtractor-rag-api-service:8000']