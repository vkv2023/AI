version: 1
disable_existing_loggers: false
incremental: false

# Create logs directory if it doesn't exist
formatters:
  standard:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(funcName)s() - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: /app/logs/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 5

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/error.log
    maxBytes: 10485760  # 10MB
    backupCount: 5

loggers:
  ImageTextExtractor:
    level: DEBUG
    handlers:
      - console
      - file
      - error_file
    propagate: false

  main_fastapi:
    level: DEBUG
    handlers:
      - console
      - file
      - error_file
    propagate: false

  weaviate:
    level: INFO
    handlers:
      - console
      - file
    propagate: false

  langchain:
    level: INFO
    handlers:
      - console
      - file
    propagate: false

root:
  level: DEBUG
  handlers:
    - console
    - file
    - error_file

