name: Scan Docker Image

on:
  workflow_run:
    workflows: ["Build and Push to ECR"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:

  scan:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::632804446443:role/github-actions-ecr-role
        aws-region: us-east-1

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region us-east-1 \
        | docker login --username AWS --password-stdin \
        632804446443.dkr.ecr.us-east-1.amazonaws.com

    - name: Scan Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 632804446443.dkr.ecr.us-east-1.amazonaws.com/ai/ai-platform:${{ github.event.workflow_run.head_sha }}
        format: table
        exit-code: 1
        ignore-unfixed: true
        severity: CRITICAL,HIGH