name: Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: arn:aws:iam::632804446443:role/github-actions-ecr-role
        aws-region: us-east-1

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker Image
      run: |
        docker build -t ai-platform ./ai-platform -f ai-platform/docker/Dockerfile

    - name: Tag Image
      run: |
        docker tag ai-platform:latest ${{ steps.login-ecr.outputs.registry }}/ai-platform:latest

    - name: Push Image to ECR
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/ai-platform:latest
