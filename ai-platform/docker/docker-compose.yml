version: "3"

services:

  api:
    build: .
    image: 632804446443.dkr.ecr.us-east-1.amazonaws.com/ai/ai-platform/latest
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
      - weaviate

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  weaviate:
    image: semitechnologies/weaviate:1.24.8
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 20
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"