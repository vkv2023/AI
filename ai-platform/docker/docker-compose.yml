version: "3.9"

services:
  fastapi-app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: ai-property-platform
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
      - weaviate
    restart: unless-stopped
    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - rag-network

  weaviate:
    image: semitechnologies/weaviate:1.24.8
    container_name: ai-weaviate
    ports:
      - "8080:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=20
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  weaviate_data: